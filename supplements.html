<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplement Management</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
<h1>💊 Supplement Management</h1>
<p>Add and manage supplement products</p>
</header>

<div class="login-card">

<form id="productForm">

<div class="input-group">
<label>Product Name</label>
<input type="text" id="productName" required>
</div>

<div class="input-group">
<label>Price (₦)</label>
<input type="number" id="price" required>
</div>

<div class="input-group">
<label>Benefits</label>
<textarea id="benefits" rows="4"></textarea>
</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<button type="submit">
Save Product
</button>

</form>

</div>

<div class="dashboard">

<h2>Available Supplements</h2>

<div id="productsList"></div>

</div>

<script type="module" src="js/supplements.js"></script>

</body>
</html>
