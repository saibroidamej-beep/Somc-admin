<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SOMC Patient Portal - Login</title>

                <link rel="stylesheet" href="style.css">
                </head>

                <body>

                <div class="background">

                    <div class="card">

                            <div class="logo">
                                        <h1>SOMC</h1>
                                                    <p>Smart Online Medical Clinic</p>
                                                            </div>

                                                                    <h2>Welcome Back</h2>

                                                                            <form id="loginForm">

                                                                                        <div class="input-group">
                                                                                                        <label>Email Address</label>

                                                                                                                        <input
                                                                                                                                            type="email"
                                                                                                                                                                id="email"
                                                                                                                                                                                    placeholder="Enter your email"
                                                                                                                                                                                                        required>
                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                <div class="input-group">

                                                                                                                                                                                                                                                <label>Password</label>

                                                                                                                                                                                                                                                                <div class="password-box">

                                                                                                                                                                                                                                                                                    <input
                                                                                                                                                                                                                                                                                                            type="password"
                                                                                                                                                                                                                                                                                                                                    id="password"
                                                                                                                                                                                                                                                                                                                                                            placeholder="Enter your password"
                                                                                                                                                                                                                                                                                                                                                                                    required>

                                                                                                                                                                                                                                                                                                                                                                                                        <span id="togglePassword">
                                                                                                                                                                                                                                                                                                                                                                                                                                👁
                                                                                                                                                                                                                                                                                                                                                                                                                                                    </span>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button id="loginBtn" type="submit">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Login

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="links">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <a href="#">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Forgot Password?
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </a>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="bottom-text">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Don't have an account?

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <a href="signup.html">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Register

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </a>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script type="module" src="login.js"></script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
