<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Consultation - SOMC</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f8fb;
    margin:0;
}

.header{
    background:#0b8f6a;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:130px;
    resize:vertical;
}

button{
    width:100%;
    padding:14px;
    background:#0b8f6a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#087b5a;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>

<body>

<header class="header">
<h1>💬 Online Consultation</h1>
<p>Speak with a healthcare professional.</p>
</header>

<div class="container">

<label>Full Name</label>
<input type="text" id="name">

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone Number</label>
<input type="text" id="phone">

<label>Main Complaint</label>
<input type="text" id="complaint">

<label>Describe your symptoms</label>
<textarea id="symptoms"></textarea>

<label>How long have you been sick?</label>
<input type="text" id="duration">

<label>Consultation Type</label>
<select id="type">
<option>Chat</option>
<option>Voice Call</option>
<option>Video Call</option>
</select>

<button id="submitBtn">
Submit Consultation
</button>

<p id="status"></p>

</div>

<script type="module" src="js/consultation.js"></script>

</body>
</html>
