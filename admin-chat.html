<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOMC Doctor Chat</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0b8f6a;
color:white;
padding:18px;
text-align:center;
}

#messages{
height:65vh;
overflow-y:auto;
padding:20px;
background:white;
}

.message{
padding:10px;
margin-bottom:10px;
border-radius:8px;
background:#eef5ff;
}

.doctor{
background:#d9ffd9;
}

footer{
display:flex;
padding:15px;
background:white;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
background:#0b8f6a;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<header>

<h2>💬 Doctor Consultation Chat</h2>

</header>

<div id="messages">

Loading conversation...

</div>

<footer>

<input
id="message"
type="text"
placeholder="Type message...">

<button id="sendBtn">

Send

</button>

</footer>

<script type="module" src="js/admin-chat.js"></script>

</body>
</html>
