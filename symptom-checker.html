<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMC AI Symptom Checker</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
<h1>🩺 SOMC AI Symptom Checker</h1>
<p>Describe how you feel and get health guidance.</p>
</header>

<div class="login-card">

<label>What is your age?</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>What symptoms are you experiencing?</label>

<textarea
id="symptoms"
rows="8"
placeholder="Example: I have fever, headache and body pain for 2 days.">
</textarea>

<button id="checkSymptoms">
Check Symptoms
</button>

</div>

<div class="login-card">

<h2>AI Result</h2>

<div id="result">

Your result will appear here.

</div>

</div>

<script type="module" src="js/symptom-checker.js"></script>

</body>
</html>
