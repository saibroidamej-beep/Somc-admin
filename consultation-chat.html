<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMC Consultation Chat</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2f7;
}

header{
    background:#0b8f6a;
    color:#fff;
    text-align:center;
    padding:15px;
}

#chatBox{
    height:70vh;
    overflow-y:auto;
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.patient{
    background:#d8f8d8;
    margin-left:auto;
}

.doctor{
    background:#f1f1f1;
}

.bottom{
    display:flex;
    gap:10px;
    padding:10px;
}

.bottom input{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.bottom button{
    padding:12px 20px;
    background:#0b8f6a;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>

<h2>💬 Consultation Chat</h2>

<p>Chat with your healthcare professional</p>

</header>

<div id="chatBox">

<div class="message doctor">
👨‍⚕️ Welcome to SOMC Consultation.
A doctor will join shortly.
</div>

</div>

<div class="bottom">

<input
type="text"
id="message"
placeholder="Type your message...">

<button id="sendBtn">

Send

</button>

</div>

<script type="module" src="js/consultation-chat.js"></script>

</body>
</html>
