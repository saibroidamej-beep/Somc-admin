<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SOMC</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="background">

    <div class="login-card">

        <div class="logo">
            <h1>👤 My Profile</h1>
            <p>Smart Online Medical Clinic</p>
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="profileName" readonly>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="profileEmail" readonly>
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="profilePhone" readonly>
        </div>

        <div class="input-group">
            <label>Role</label>
            <input type="text" id="profileRole" readonly>
        </div>

        <div class="input-group">
            <label>Account Status</label>
            <input type="text" id="profileStatus" readonly>
        </div>

        <button onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>

    </div>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
