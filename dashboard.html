<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOMC Patient Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{
width:100%;
max-width:900px;
background:#fff;
border-radius:20px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.dashboard h1{
color:#0b5ed7;
margin-bottom:10px;
}

.dashboard p{
font-size:16px;
color:#555;
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card-box{
background:#f4f8ff;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card-box:hover{
transform:translateY(-5px);
}

.card-box h3{
color:#0b5ed7;
margin-bottom:10px;
}

.logout-btn{
margin-top:30px;
background:#dc3545;
color:#fff;
}

</style>

</head>

<body>

<div class="dashboard">

<h1>Welcome to SOMC</h1>

<p>
Smart Online Medical Clinic Patient Portal
</p>

<div class="cards">

<div class="card-box">
<h3>👤 My Profile</h3>
<p>View and manage your profile.</p>
</div>

<div class="card-box">
<h3>📅 Appointments</h3>
<p>Book and manage appointments.</p>
</div>

<div class="card-box">
<h3>💊 Medical Records</h3>
<p>Access your medical records.</p>
</div>

<div class="card-box">
<h3>💬 Online Consultation</h3>
<p>Talk to healthcare professionals.</p>
</div>

</div>

<button id="logoutBtn" class="logout-btn">
Logout
</button>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
